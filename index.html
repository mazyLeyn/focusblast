<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Focus Blast</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0c14] text-slate-100 flex flex-col relative overflow-hidden">

<!-- Background -->
<div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-indigo-500/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-purple-500/10 blur-[140px]"></div>

<!-- Header -->
<header class="z-10 bg-slate-900/40 backdrop-blur-md border-b border-slate-800/60 sticky top-0">
  <div class="max-w-4xl mx-auto px-4 py-3 flex justify-center">
    <h1 class="text-xl font-extrabold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
      Focus Blast
    </h1>
  </div>
</header>

<!-- Progress -->
<div class="z-10 w-full max-w-xl mx-auto px-4 mt-4">
  <div class="flex justify-between text-xs text-slate-400">
    <span>ODAKLANMA BARI</span>
    <span id="progressText">0%</span>
  </div>

  <div class="w-full h-3 bg-slate-800 rounded-full mt-1">
    <div id="progressBar"
      class="h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-full"
      style="width:0%">
    </div>
  </div>

  <div id="readyBox" class="hidden mt-3 bg-indigo-500/20 p-3 rounded-xl text-center">
    Odaklanma barı dolu! 
    <button onclick="goTimer()" class="ml-2 px-3 py-1 bg-indigo-600 rounded">Başla</button>
  </div>
</div>

<!-- Tabs -->
<div class="flex justify-center mt-6">
  <div class="flex p-1 bg-slate-900 rounded-xl">
    <button onclick="showTab('game')" id="gameBtn" class="px-6 py-2 bg-indigo-600 rounded-lg">
      Oyun
    </button>
    <button onclick="showTab('timer')" id="timerBtn" class="px-6 py-2 text-slate-400">
      Timer
    </button>
  </div>
</div>

<!-- Content -->
<main class="flex-grow flex items-center justify-center py-6">

  <!-- GAME -->
  <div id="gameTab">
    <button onclick="increaseFocus()" 
      class="px-6 py-3 bg-indigo-600 rounded-xl">
      Blok Patlat (+10)
    </button>
  </div>

  <!-- TIMER -->
  <div id="timerTab" class="hidden text-center">
    <h2 class="text-xl mb-3">Çalışma Modu</h2>
    <button onclick="showTab('game')" class="px-4 py-2 bg-purple-600 rounded">
      Geri Dön
    </button>
  </div>

</main>

<footer class="text-center py-4 text-xs text-slate-500">
  Focus Blast • Zihnini Tazelemek İçin Blok Patlat
</footer>

<script>
let focus = 0;

function increaseFocus() {
  focus += 10;
  if (focus > 100) focus = 100;

  document.getElementById("progressBar").style.width = focus + "%";
  document.getElementById("progressText").innerText = focus + "%";

  if (focus >= 100) {
    document.getElementById("readyBox").classList.remove("hidden");
  }
}

function showTab(tab) {
  document.getElementById("gameTab").classList.add("hidden");
  document.getElementById("timerTab").classList.add("hidden");

  document.getElementById(tab + "Tab").classList.remove("hidden");

  document.getElementById("gameBtn").classList.remove("bg-indigo-600");
  document.getElementById("timerBtn").classList.remove("bg-indigo-600");

  document.getElementById(tab + "Btn").classList.add("bg-indigo-600");
}

function goTimer() {
  showTab("timer");
}
</script>

</body>
</html>
