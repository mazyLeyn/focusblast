<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Blast | %100 Arena Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --bg: #05070a; --grid-bg: #10141e; --cell-empty: #1a1f2e; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; touch-action: none; overflow: hidden; }
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; background: var(--grid-bg); padding: 8px; border-radius: 12px; }
        .cell { aspect-ratio: 1/1; border-radius: 4px; transition: background 0.2s; }
        .cell-empty { background-color: var(--cell-empty); }
        .cell-filled { background: linear-gradient(135deg, #6366f1, #a855f7); box-shadow: inset 0 0 8px rgba(255,255,255,0.2); }
        .shape-slot { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 12px; cursor: grab; }
        .shape-slot:active { cursor: grabbing; }
        .shape-grid { display: grid; gap: 2px; }
        .shape-block { width: 20px; height: 20px; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SHAPES = [
            { id: 1, cells: [[1, 1], [1, 1]], color: 'bg-indigo-500' },
            { id: 2, cells: [[1, 1, 1]], color: 'bg-indigo-500' },
            { id: 3, cells: [[1], [1], [1]], color: 'bg-indigo-500' },
            { id: 4, cells: [[1, 1], [1, 0]], color: 'bg-indigo-500' },
            { id: 5, cells: [[1]], color: 'bg-indigo-500' }
        ];

        function App() {
            const [grid, setGrid] = useState(Array(64).fill(0));
            const [dock, setDock] = useState([]);
            const [score, setScore] = useState(0);
            const [draggedShape, setDraggedShape] = useState(null);

            useEffect(() => { spawnShapes(); }, []);

            const spawnShapes = () => {
                const newShapes = Array(3).fill(null).map(() => SHAPES[Math.floor(Math.random() * SHAPES.length)]);
                setDock(newShapes);
            };

            const handleDrop = (gridIdx, shape, dockIdx) => {
                const newGrid = [...grid];
                const row = Math.floor(gridIdx / 8);
                const col = gridIdx % 8;

                // Yerleşebilir mi kontrolü
                for (let r = 0; r < shape.cells.length; r++) {
                    for (let c = 0; c < shape.cells[r].length; c++) {
                        if (shape.cells[r][c]) {
                            const targetR = row + r;
                            const targetC = col + c;
                            if (targetR >= 8 || targetC >= 8 || grid[targetR * 8 + targetC]) return false;
                            newGrid[targetR * 8 + targetC] = 1;
                        }
                    }
                }

                // Satır/Sütun Patlatma
                let finalGrid = [...newGrid];
                let toClear = new Set();

                for (let i = 0; i < 8; i++) {
                    // Satır kontrol
                    if (newGrid.slice(i * 8, i * 8 + 8).every(x => x === 1)) 
                        for(let j=0; j<8; j++) toClear.add(i * 8 + j);
                    // Sütun kontrol
                    let colCells = [];
                    for(let j=0; j<8; j++) colCells.push(newGrid[j * 8 + i]);
                    if (colCells.every(x => x === 1))
                        for(let j=0; j<8; j++) toClear.add(j * 8 + i);
                }

                toClear.forEach(idx => finalGrid[idx] = 0);
                setGrid(finalGrid);
                setScore(s => s + (toClear.size * 10) + 5);

                const newDock = [...dock];
                newDock[dockIdx] = null;
                if (newDock.every(x => x === null)) spawnShapes();
                else setDock(newDock);
                return true;
            };

            return (
                <div className="flex flex-col items-center justify-between min-h-screen py-10 px-4">
                    {/* Skor / Odak Barı */}
                    <div className="w-full max-w-sm">
                        <div className="flex justify-between mb-2">
                            <span className="font-bold text-indigo-400">FOCUS BLAST</span>
                            <span className="text-white font-mono">{score}</span>
                        </div>
                        <div className="w-full h-3 bg-slate-900 rounded-full border border-slate-800">
                            <div className="h-full bg-indigo-500 transition-all" style={{width: `${Math.min(score/5, 100)}%`}} />
                        </div>
                    </div>

                    {/* Ana Oyun Tahtası */}
                    <div className="grid-container w-full max-w-[360px] shadow-2xl">
                        {grid.map((cell, i) => (
                            <div 
                                key={i} 
                                onDragOver={(e) => e.preventDefault()}
                                onDrop={() => draggedShape && handleDrop(i, draggedShape.shape, draggedShape.idx)}
                                onClick={() => draggedShape && handleDrop(i, draggedShape.shape, draggedShape.idx)} // Mobil kolaylığı
                                className={`cell ${cell ? 'cell-filled' : 'cell-empty'}`}
                            />
                        ))}
                    </div>

                    {/* Aşağıdaki Şekiller (Dock) */}
                    <div className="flex gap-4">
                        {dock.map((shape, i) => (
                            <div 
                                key={i} 
                                draggable={!!shape}
                                onDragStart={() => setDraggedShape({shape, idx: i})}
                                onClick={() => setDraggedShape({shape, idx: i})}
                                className={`shape-slot ${draggedShape?.idx === i ? 'border-2 border-indigo-500' : ''}`}
                            >
                                {shape && (
                                    <div className="shape-grid" style={{gridTemplateColumns: `repeat(${shape.cells[0].length}, 1fr)`}}>
                                        {shape.cells.map((row, r) => row.map((c, cl) => (
                                            <div key={`${r}-${cl}`} className={`shape-block ${c ? shape.color : 'opacity-0'}`} />
                                        )))}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    <footer className="text-[10px] text-slate-600 tracking-widest">
                        DESIGNED BY ONUR KARATAŞ
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
